<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AESDR — Deck Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020617;
    --text: #F8FAFC;
    --muted: #94A3B8;
    --theme: #10B981;
    --amber: rgba(245,158,11,0.75);
    --iris: linear-gradient(90deg, #FF006E, #FF6B00, #F59E0B, #10B981, #38BDF8, #8B5CF6, #FF006E);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  .scroll-space {
    height: 1500vh;
    position: relative;
  }

  .section-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding-top: clamp(40px, 6vh, 80px);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .section-header.visible { opacity: 1; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--theme);
    margin-bottom: 8px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .04em;
    line-height: 1;
  }

  /* Card counter */
  .card-counter {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    color: rgba(148,163,184,0.3);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .card-counter.visible { opacity: 1; }

  /* Deck viewport */
  .deck-viewport {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(520px, 88vw);
    height: min(340px, 55vh);
    z-index: 5;
    perspective: 1200px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .deck-viewport.visible { opacity: 1; }

  .deck-card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    padding: clamp(28px, 4vw, 44px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.6s cubic-bezier(.23,1,.32,1), opacity 0.6s ease;
    will-change: transform, opacity;
    backface-visibility: hidden;
  }

  /* Shadow layers behind top card */
  .deck-card .shadow-1,
  .deck-card .shadow-2 {
    display: none;
  }

  .card-lesson-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 900;
    letter-spacing: .04em;
    line-height: 1;
    margin-bottom: 8px;
    background: var(--iris);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  .card-lesson-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text);
    margin-bottom: 20px;
  }

  .card-question {
    font-family: 'Caveat', cursive;
    font-size: clamp(20px, 3vw, 28px);
    color: var(--amber);
    line-height: 1.4;
    transform: rotate(-0.5deg);
  }

  /* Iris line at bottom of card */
  .deck-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--iris);
    background-size: 300% 100%;
    animation: shimmer 4s linear infinite;
    opacity: 0.5;
  }

  /* Depth shadows behind the deck */
  .deck-shadow {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }

  /* Scroll hint */
  .scroll-hint {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .scroll-hint.visible { opacity: 1; }
  .scroll-hint span {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: rgba(148,163,184,0.25);
  }
  .scroll-hint .bar {
    width: 1px; height: 24px;
    position: relative;
    overflow: hidden;
  }
  .scroll-hint .bar::after {
    content: '';
    position: absolute; top: -100%; left: 0;
    width: 1px; height: 100%;
    background: var(--iris); background-size: 100% 300%;
    animation: shimmer 4s linear infinite, drop 1.5s ease-in-out infinite;
  }

  @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
  @keyframes drop { 0% { top: -100%; } 50% { top: 0; } 100% { top: 100%; } }
</style>
</head>
<body>

<div class="section-header" id="header">
  <div class="section-label">What you get</div>
  <h2 class="section-title">12 Lessons. Peel to preview.</h2>
</div>

<div class="card-counter" id="counter">01 / 12</div>

<div class="deck-viewport" id="deck">
  <!-- Shadow layers for depth effect -->
  <div class="deck-shadow" id="shadow2" style="transform: translate(8px, 8px) rotate(1.5deg);"></div>
  <div class="deck-shadow" id="shadow1" style="transform: translate(4px, 4px) rotate(0.7deg);"></div>
</div>

<div class="scroll-hint" id="scrollHint">
  <span>scroll to peel</span>
  <div class="bar"></div>
</div>

<div class="scroll-space" id="scroll-space"></div>

<script>
const lessons = [
  { num: "01", title: "Building Real Camaraderie", q: "When's the last time your team felt like an actual team?" },
  { num: "02", title: "Breaking Down Silos", q: "How many deals died in the handoff you never talked about?" },
  { num: "03", title: "Performance Pitfalls", q: "Are you getting better — or just getting by?" },
  { num: "04", title: "Navigating Manager Madness", q: "Does your manager coach you... or just count your calls?" },
  { num: "05", title: "The Sales Playbook", q: "What's your system? And if you don't have one — what have you been doing?" },
  { num: "06", title: "Beyond the Sales Playbook", q: "What do you do when the script runs out and you're live?" },
  { num: "07", title: "Prospecting & Pipeline", q: "If inbound dried up tomorrow, would you survive?" },
  { num: "08", title: "The 30% Rule", q: "What's your actual close rate? Not the one you told your VP." },
  { num: "09", title: "Salesforce Survival Guide", q: "Is your CRM protecting you — or building the case against you?" },
  { num: "10", title: "Breaking Down the Commission Myth", q: "Can you survive three bad months in a row? Financially?" },
  { num: "11", title: "Sober Selling", q: "What if the problem isn't your energy — it's your process?" },
  { num: "12", title: "Leveling Up SaaS Relationships", q: "Who would vouch for you if you changed companies tomorrow?" },
];

const deck = document.getElementById('deck');
const header = document.getElementById('header');
const counter = document.getElementById('counter');
const scrollHint = document.getElementById('scrollHint');
const shadow1 = document.getElementById('shadow1');
const shadow2 = document.getElementById('shadow2');
const totalCards = lessons.length;

// Create cards (bottom to top so card 0 is on top)
const cardEls = [];
for (let i = totalCards - 1; i >= 0; i--) {
  const l = lessons[i];
  const card = document.createElement('div');
  card.className = 'deck-card';
  card.style.zIndex = totalCards - i;
  card.innerHTML = `
    <div class="card-lesson-num">${l.num}</div>
    <div class="card-lesson-title">${l.title}</div>
    <div class="card-question">"${l.q}"</div>
  `;
  deck.appendChild(card);
  cardEls[i] = card;
}

// Show on load
setTimeout(() => {
  header.classList.add('visible');
  deck.classList.add('visible');
  counter.classList.add('visible');
  scrollHint.classList.add('visible');
}, 300);

function update() {
  const totalScroll = document.getElementById('scroll-space').offsetHeight - window.innerHeight;
  if (totalScroll <= 0) return;
  const progress = Math.min(1, window.scrollY / totalScroll);
  const cardProgress = progress * totalCards;
  const activeIndex = Math.min(Math.floor(cardProgress), totalCards - 1);
  const cardFrac = cardProgress - activeIndex;

  // Update counter
  const current = Math.min(activeIndex + 1, totalCards);
  counter.textContent = String(current).padStart(2, '0') + ' / ' + totalCards;

  // Animate cards
  cardEls.forEach((card, i) => {
    if (i < activeIndex) {
      // Already peeled — off screen to the left
      card.style.transform = 'translateX(-120%) rotate(-8deg)';
      card.style.opacity = '0';
    } else if (i === activeIndex) {
      // Active card — peeling based on frac
      if (cardFrac < 0.7) {
        card.style.transform = 'translateX(0) rotate(0deg)';
        card.style.opacity = '1';
      } else {
        const t = (cardFrac - 0.7) / 0.3;
        const x = t * -120;
        const r = t * -8;
        card.style.transform = `translateX(${x}%) rotate(${r}deg)`;
        card.style.opacity = String(1 - t);
      }
    } else {
      // Behind — stack offset
      const depth = i - activeIndex;
      if (depth <= 3) {
        card.style.transform = `translate(${depth * 3}px, ${depth * 3}px) rotate(${depth * 0.5}deg)`;
        card.style.opacity = String(Math.max(0.3, 1 - depth * 0.25));
      } else {
        card.style.opacity = '0';
      }
    }
  });

  // Shadow layers
  const remaining = totalCards - activeIndex;
  shadow1.style.opacity = remaining > 1 ? '1' : '0';
  shadow2.style.opacity = remaining > 2 ? '1' : '0';

  // Hide scroll hint after first peel
  if (activeIndex > 0) scrollHint.classList.remove('visible');
  else scrollHint.classList.add('visible');
}

window.addEventListener('scroll', update, { passive: true });
window.addEventListener('resize', update);
update();
</script>
</body>
</html>
