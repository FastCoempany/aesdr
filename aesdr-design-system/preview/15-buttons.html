<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 28px 32px; display:flex; flex-direction:column; gap: 22px; }
  .row { display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .lbl { font: 9px/1 var(--mono); letter-spacing:.18em; text-transform: uppercase; color: var(--muted); width: 130px; }

  .btn {
    display:inline-flex; align-items:center; gap: 8px;
    padding: 14px 22px; font: 700 14px/1 var(--cond); letter-spacing: .15em;
    text-transform: uppercase; border: 0; cursor: pointer; user-select: none;
    transition: transform .12s ease, background .15s ease, color .15s ease;
  }
  .btn-iris { color: var(--cream); background: var(--iris); background-size: 200% 100%; animation: iris-flow 8s linear infinite; }
  .btn-iris:hover { transform: translateY(-1px); animation-duration: 4s; }
  .btn-solid { background: var(--ink); color: var(--cream); }
  .btn-solid:hover { transform: translateY(-1px); background: #000; }
  .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--cream); }
  .btn-crimson { background: var(--crimson); color: var(--cream); }
  .btn-crimson:hover { transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--cream); border: 1.5px solid var(--on-crimson-line); }
  .crimson-bg { background: var(--crimson); padding: 14px 18px; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="lbl">Iris primary</span><button class="btn btn-iris">Get Access →</button></div>
  <div class="row"><span class="lbl">Ink solid</span><button class="btn btn-solid">Continue to Payment</button></div>
  <div class="row"><span class="lbl">Outline</span><button class="btn btn-outline">SDR · $249</button></div>
  <div class="row"><span class="lbl">Crimson on cream</span><button class="btn btn-crimson">Take the Tour</button></div>
  <div class="row"><span class="lbl">Ghost on crimson</span><div class="crimson-bg"><button class="btn btn-ghost">Maybe Later</button></div></div>
</div>
</body></html>
