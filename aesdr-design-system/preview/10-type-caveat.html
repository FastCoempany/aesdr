<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Caveat · Michael's voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 26px 32px; }
  .stamp { display:inline-block; border: 1px solid var(--crimson-hairline); color: var(--crimson-stamp); font: 700 10px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; padding: 4px 10px; transform: rotate(-1.5deg); }
  .quote { font: 24px/1.4 var(--hand); color: var(--crimson); margin: 14px 0 8px; max-width: 620px; transform: rotate(-0.5deg); }
  .lbl { font: var(--mono-caption); letter-spacing:.18em; text-transform: uppercase; color: var(--muted); }
</style></head>
<body>
<div class="card">
  <span class="stamp">Reserved · Michael's voice only</span>
  <div class="quote">"When's the last time your team felt like an actual team?"</div>
  <div class="lbl">CAVEAT · 24 PX · CRIMSON ON CREAM · NOWHERE ELSE IN THE SYSTEM</div>
</div>
</body></html>
