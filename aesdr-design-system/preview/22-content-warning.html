<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Content Warning</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--crimson); padding: 22px 28px; box-sizing: border-box; }
  .card { padding: 0; }
  .box {
    border: 1px solid var(--on-crimson-line);
    color: var(--cream);
    padding: 18px 22px;
    display:flex; gap: 16px; align-items:flex-start;
    max-width: 560px;
  }
  .icon {
    width: 22px; height: 22px; border: 1.5px solid var(--cream);
    border-radius: 9px;
    display:flex; align-items:center; justify-content:center;
    font: 700 13px/1 var(--display); flex: 0 0 22px;
  }
  .lbl { font: 11px/1 var(--mono); letter-spacing: .30em; text-transform: uppercase; color: var(--on-crimson-eyebrow); margin-bottom: 6px; }
  .body { font: 14px/1.55 var(--serif); color: var(--on-crimson-soft); margin: 0; }
</style></head>
<body>
<div class="card">
  <div class="box">
    <span class="icon">!</span>
    <div>
      <div class="lbl">CONTENT WARNING</div>
      <p class="body">Profanity. Dark humor about your manager. Specific dollar amounts. The phrase "potential" used pejoratively. If any of that is a problem, this isn't your course.</p>
    </div>
  </div>
</div>
</body></html>
