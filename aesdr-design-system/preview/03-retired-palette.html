<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Retired Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 24px; position: relative; }
  .stamp {
    display: inline-block;
    border: 1px solid var(--crimson-hairline);
    color: var(--crimson-stamp);
    font: 700 10px/1 var(--cond);
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 4px 10px;
    transform: rotate(-2deg);
    margin-bottom: 12px;
  }
  .row { display:grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 8px; }
  .swatch { aspect-ratio: 1 / 1; padding: 8px; box-sizing: border-box; display:flex; flex-direction:column; justify-content:flex-end; position: relative; overflow:hidden; }
  .name { font: var(--mono-caption); letter-spacing:.15em; }
  .hex  { font: var(--mono-caption); letter-spacing:.15em; opacity:.75; }
  .strike {
    position: absolute; left:-10%; right:-10%; top:50%; height:2px;
    background: var(--crimson); opacity:.7; transform: rotate(-12deg); transform-origin:center;
  }
  .strike-row {
    position: absolute; left: 24px; right: 24px; top: 60%; height:2px;
    background: var(--crimson); opacity:.5; transform: rotate(-1.2deg);
  }
  .note { font: italic 13px/1.5 var(--serif); color: var(--muted); margin-top: 12px; }
</style></head>
<body>
<div class="card">
  <span class="stamp">Don't use · Retired</span>
  <div class="row">
    <div class="swatch" style="background:#020617;color:#fff"><div class="name">#020617</div></div>
    <div class="swatch" style="background:#0F172A;color:#fff"><div class="name">#0F172A</div></div>
    <div class="swatch" style="background:#1E293B;color:#fff"><div class="name">#1E293B</div></div>
    <div class="swatch" style="background:#10B981;color:#000"><div class="name">--theme</div><div class="hex">#10B981</div></div>
    <div class="swatch" style="background:#EF4444;color:#fff"><div class="name">--coral</div><div class="hex">#EF4444</div></div>
    <div class="swatch" style="background:#38BDF8;color:#000"><div class="name">--cobalt</div><div class="hex">#38BDF8</div></div>
    <div class="swatch" style="background:#F59E0B;color:#000"><div class="name">--amber</div><div class="hex">#F59E0B</div></div>
    <div class="swatch" style="background:#8B5CF6;color:#fff"><div class="name">--violet</div><div class="hex">#8B5CF6</div></div>
    <div class="strike-row"></div>
  </div>
  <p class="note">AESDR pre-1.0 palette. Lives in legacy course HTML only — never reach for these in new work.</p>
</div>
</body></html>
