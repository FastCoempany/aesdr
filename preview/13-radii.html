<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 24px; display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { aspect-ratio: 1 / 0.95; background: var(--crimson); display:flex; flex-direction:column; justify-content:flex-end; padding: 12px; box-sizing: border-box; color: var(--cream); }
  .lbl { font: 700 10px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; opacity: .85; }
  .px  { font: 9px/1 var(--mono); letter-spacing:.15em; opacity:.7; margin-top: 4px; }
  .pill { background: var(--cream); color: var(--crimson); aspect-ratio: 1 / 0.95; display:flex; align-items:center; justify-content:center; padding: 0; }
  .pill > div { background: var(--crimson); color: var(--cream); padding: 8px 18px; font: 700 12px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; border-radius: 9999px; }
</style></head>
<body>
<div class="card">
  <div class="tile" style="border-radius:0"><div class="lbl">--r-0</div><div class="px">0 PX · DEFAULT</div></div>
  <div class="tile" style="border-radius:2px"><div class="lbl">--r-hair</div><div class="px">2 PX · ARTBOARD</div></div>
  <div class="tile" style="border-radius:4px"><div class="lbl">--r-card</div><div class="px">4 PX · DECK ONLY</div></div>
  <div class="tile" style="border-radius:9px;background:var(--cream);color:var(--crimson);border:1.5px solid var(--crimson);align-items:center;justify-content:center;padding:0">
    <div style="font: 700 18px/1 var(--display); width:18px; height:18px; border-radius:50%; border:1.5px solid var(--crimson); display:flex; align-items:center; justify-content:center; font-size:11px;">!</div>
    <div class="lbl" style="color:var(--crimson); margin-top:8px">--r-9</div>
    <div class="px" style="color:var(--crimson)">9 PX · WARN ICON</div>
  </div>
  <div class="pill"><div>AE</div></div>
</div>
</body></html>
