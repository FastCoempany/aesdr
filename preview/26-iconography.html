<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 24px 28px; display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile { border: 1px solid var(--line-card); background: var(--paper); padding: 18px; aspect-ratio: 1 / 0.95; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 10px; }
  .lbl { font: 9px/1 var(--mono); letter-spacing:.18em; color: var(--muted); text-transform: uppercase; text-align: center; }
  .corner { position: relative; width: 28px; height: 28px; }
  .corner::before { content:''; position:absolute; left:0; top:0; width:28px; height:1px; background: var(--ink); opacity:.6; }
  .corner::after  { content:''; position:absolute; left:0; top:0; height:28px; width:1px; background: var(--ink); opacity:.6; }
  .cur { display:inline-block; width: 14px; height: 14px; background: var(--crimson); }
  .warn { width: 22px; height: 22px; border: 1.5px solid var(--crimson); border-radius: 9px; display:flex; align-items:center; justify-content:center; font: 700 13px/1 var(--display); color: var(--crimson); }
  .stamp-box { border: 1px solid var(--crimson-hairline); color: var(--crimson-stamp); font: 700 11px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; padding: 5px 10px; transform: rotate(-3deg); }
  .ghost-mini { font: italic 700 34px/1 var(--display); color: rgba(0,0,0,.18); }
  .iris-rule { width: 36px; height: 2px; background: var(--iris); background-size: 200% 100%; animation: iris-flow 8s linear infinite; }
</style></head>
<body>
<div class="card">
  <div class="tile">
    <svg width="36" height="10" viewBox="0 0 36 10"><circle cx="5" cy="5" r="4" fill="#EF4444" fill-opacity=".5"/><circle cx="18" cy="5" r="4" fill="#F59E0B" fill-opacity=".5"/><circle cx="31" cy="5" r="4" fill="#10B981" fill-opacity=".5"/></svg>
    <div class="lbl">terminal-dots</div>
  </div>
  <div class="tile"><span class="cur"></span><div class="lbl">cursor (crimson)</div></div>
  <div class="tile"><span class="corner"></span><div class="lbl">corner-bracket-tl</div></div>
  <div class="tile"><span class="warn">!</span><div class="lbl">warning-circle</div></div>
  <div class="tile"><span class="stamp-box">Classified</span><div class="lbl">classified-stamp</div></div>
  <div class="tile"><span class="ghost-mini">01</span><div class="lbl">ghost-numeral</div></div>
  <div class="tile"><span class="iris-rule"></span><div class="lbl">iris-rule (2px)</div></div>
  <div class="tile" style="background:var(--cream); border-style:dashed; border-color: var(--crimson-hairline)">
    <span class="lbl" style="color:var(--crimson)">8 ICONS · NO MORE</span>
    <div class="lbl">DON'T REACH FOR HEROICONS</div>
  </div>
</div>
</body></html>
