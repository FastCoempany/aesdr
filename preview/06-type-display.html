<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 24px 28px; }
  .h0 { font: italic 900 88px/1 var(--display); color: var(--ink); letter-spacing: -.005em; margin: 0; }
  .meta { display:flex; gap: 16px; align-items:baseline; margin-top: 10px; }
  .lbl  { font: var(--mono-caption); letter-spacing:.18em; text-transform: uppercase; color: var(--muted); }
  .rule { width: 60px; height: 2px; background: var(--iris); background-size: 200% 100%; animation: iris-flow 8s linear infinite; margin-top: 8px; }
</style></head>
<body>
<div class="card">
  <div class="lbl">PLAYFAIR DISPLAY · BLACK ITALIC · THE VERDICT REGISTER</div>
  <div class="rule"></div>
  <h1 class="h0">Stop Surviving.<br>Start Owning It.</h1>
  <div class="meta">
    <span class="lbl">88 / 96 · -0.5%</span>
    <span class="lbl">Hero, section titles</span>
  </div>
</div>
</body></html>
