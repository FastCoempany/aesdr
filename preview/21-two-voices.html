<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Two Voices</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 26px 32px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items:start; }
  .col { position: relative; }
  .col + .col { padding-left: 32px; border-left: 1px solid var(--light); }
  .lbl { font: 9px/1 var(--mono); letter-spacing:.20em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .rowan { font: italic 900 28px/1.1 var(--display); color: var(--ink); margin: 0 0 8px; }
  .rowan .iris { background: var(--iris); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color: transparent; -webkit-text-fill-color:transparent; animation: iris-flow 8s linear infinite; }
  .rowan-cap { font: 700 22px/1.1 var(--cond); letter-spacing: .04em; text-transform: uppercase; color: var(--ink); margin: 8px 0 0; }
  .michael { font: 22px/1.4 var(--hand); color: var(--crimson); margin: 0; transform: rotate(-0.5deg); }
  .seam {
    grid-column: 1 / -1; display:flex; align-items:center; gap: 14px;
    margin-top: 22px;
  }
  .rule { flex:1; height: 2px; background: var(--iris); background-size:200% 100%; animation: iris-flow 8s linear infinite; }
  .merge { font: italic 900 18px/1 var(--display); color: var(--ink); white-space:nowrap; }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="col">
      <div class="lbl">VOICE · ROWAN · VERDICT</div>
      <h3 class="rowan">Your commission check is not income. It is a <span class="iris">verdict</span>.</h3>
      <div class="rowan-cap">A verdict on the last 30 days.</div>
    </div>
    <div class="col">
      <div class="lbl">VOICE · MICHAEL · 2AM</div>
      <p class="michael">"I made $8,200 last month. I made $2,100 this month. I bought a $300 jacket during the $8,200 month. Fashion."</p>
    </div>
    <div class="seam">
      <span class="rule"></span>
      <span class="merge">— THE TWO BECOME ONE —</span>
      <span class="rule"></span>
    </div>
  </div>
</div>
</body></html>
