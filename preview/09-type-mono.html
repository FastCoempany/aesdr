<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Mono · Operator Chrome</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 22px 28px; display:flex; flex-direction:column; gap: 12px; }
  .eb-11 { font: 11px/1 var(--mono); letter-spacing: .30em; text-transform: uppercase; color: var(--muted); }
  .eb-10 { font: 10px/1 var(--mono); letter-spacing: .30em; text-transform: uppercase; color: var(--muted); }
  .eb-9  { font: 9px/1 var(--mono);  letter-spacing: .30em; text-transform: uppercase; color: var(--muted); }
  .term  { font: 15px/1 var(--mono); color: var(--ink); }
  .term .p { color: var(--muted); margin-right: 8px; }
  .cur { display:inline-block; width: 9px; height: 16px; vertical-align: -3px; background: var(--crimson); }
  .file { font: 700 18px/1 var(--mono); color: var(--ink); }
  .row { display:grid; grid-template-columns: 110px 1fr; gap: 16px; align-items:center; }
  .tag { font: var(--mono-caption); letter-spacing:.18em; text-transform: uppercase; color: var(--muted); opacity:.6; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="tag">Eyebrow 11</span><span class="eb-11">AESDR · 12 LESSONS · A BETTER YOU</span></div>
  <div class="row"><span class="tag">Meta 10</span><span class="eb-10">CANONICAL PATTERN · ACTIVE PALETTE</span></div>
  <div class="row"><span class="tag">Caption 9</span><span class="eb-9">EDITORIAL SPLIT · CRIMSON LEFT · WARNING BOX</span></div>
  <div class="row"><span class="tag">Term 15</span><span class="term"><span class="p">&gt;</span>diagnosis: least productive person you know.<span class="cur"></span></span></div>
  <div class="row"><span class="tag">File 18b</span><span class="file">you_already_knew.exe</span></div>
</div>
</body></html>
