<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Deck-peel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 36px 48px; perspective: 1800px; }
  .stack { position: relative; width: 360px; height: 230px; }
  .deck {
    position:absolute; inset: 0; background: var(--paper);
    border: 1px solid var(--line-card); border-radius: 4px;
    padding: 18px 20px; box-sizing: border-box;
    box-shadow: 0 4px 32px rgba(0,0,0,.04);
    transform-origin: left center;
  }
  .deck.d2 { transform: translate(8px, 10px) rotate(-1.5deg); z-index: 1; opacity:.92; }
  .deck.d1 { transform: translate(4px, 5px)  rotate(-0.6deg); z-index: 2; opacity:.97; }
  .deck.d0 { z-index: 3; transform: rotateY(-30deg) rotateZ(-2deg) translateX(-2%); }
  .num { font: italic 900 36px/1 var(--display); color: var(--ink); opacity:.18; position:absolute; top:14px; right:18px; }
  .meta { font: 9px/1 var(--mono); letter-spacing:.20em; color: var(--muted); text-transform: uppercase; }
  .h { font: 700 26px/1.0 var(--cond); letter-spacing: .03em; color: var(--ink); margin: 14px 0 8px; }
  .quote { font: italic 13px/1.4 var(--serif); color: var(--muted); margin: 0; }
  .tip { font: 9px/1 var(--mono); letter-spacing: .25em; text-transform: uppercase; color: var(--muted); position:absolute; bottom: 14px; left: 20px; }
</style></head>
<body>
<div class="card">
  <div class="stack">
    <div class="deck d2">
      <div class="num">03</div>
      <div class="meta">LESSON · 03 / 12</div>
      <div class="h">When the Manager Lies</div>
    </div>
    <div class="deck d1">
      <div class="num">02</div>
      <div class="meta">LESSON · 02 / 12</div>
      <div class="h">Building Real Camaraderie</div>
    </div>
    <div class="deck d0">
      <div class="num">01</div>
      <div class="meta">LESSON · 01 / 12</div>
      <div class="h">The Diagnosis</div>
      <p class="quote">"Stop pretending you don't already know what's wrong."</p>
      <span class="tip">CLICK · TAP · → · TO PEEL</span>
    </div>
  </div>
</div>
</body></html>
