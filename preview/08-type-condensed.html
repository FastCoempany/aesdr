<!doctype html>
<html><head><meta charset="utf-8">
<title>Card — Barlow Condensed</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--cream); }
  .card { padding: 22px 28px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:grid; grid-template-columns: 110px 1fr; align-items:center; gap: 16px; }
  .tag  { font: var(--mono-caption); letter-spacing:.18em; text-transform: uppercase; color: var(--muted); }
  .deck-title { font: 700 26px/1 var(--cond); letter-spacing: .03em; color: var(--ink); }
  .faq-q { font: 700 18px/1.2 var(--cond); letter-spacing: .03em; color: var(--ink); }
  .btn-lbl { font: 700 14px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; color: var(--ink); }
  .stamp { display:inline-block; border: 1px solid var(--crimson-hairline); color: var(--crimson-stamp); font: 700 10px/1 var(--cond); letter-spacing: .15em; text-transform: uppercase; padding: 4px 10px; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="tag">Deck · 26</span><span class="deck-title">Building Real Camaraderie</span></div>
  <div class="row"><span class="tag">FAQ · 18</span><span class="faq-q">Is this just another motivational sales course?</span></div>
  <div class="row"><span class="tag">Btn · 14u</span><span class="btn-lbl">GET ACCESS →</span></div>
  <div class="row"><span class="tag">Stamp · 10u</span><span class="stamp">Classified</span></div>
</div>
</body></html>
