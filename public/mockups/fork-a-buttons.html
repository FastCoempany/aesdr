<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fork A — Side-by-Side Buttons</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap');

  :root {
    --bg:#0B0B0F; --ink:#0A0A0F; --cream:#F4EFE6; --text:#F8FAFC;
    --muted:#94A3B8; --line:rgba(255,255,255,.12);
    --iris:linear-gradient(90deg,#FF006E,#FF6B00,#F59E0B,#10B981,#38BDF8,#8B5CF6,#FF006E);
    --serif:'Inter',sans-serif; --mono:'JetBrains Mono',monospace; --display:'Playfair Display',serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);overflow:hidden}

  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px}

  /* Layer system */
  .layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s ease;pointer-events:none}
  .layer.on{opacity:1;pointer-events:auto}

  .iris{
    background:var(--iris);background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:shimmer 4s linear infinite;
  }
  @keyframes shimmer{to{background-position:300% 0}}

  /* Confession typing */
  .confession{max-width:760px;width:90%;text-align:left}
  .tline{font-size:clamp(22px,3.5vw,38px);font-weight:600;line-height:1.5;color:var(--text);margin-bottom:18px;min-height:1.5em}
  .cursor{display:inline-block;width:2px;height:1.05em;background:#10B981;vertical-align:text-bottom;margin-left:2px;animation:blink .8s step-end infinite}
  @keyframes blink{50%{opacity:0}}

  /* Fork screen */
  .fork{flex-direction:column;gap:48px}
  .fork .prompt{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);text-align:center}
  .fork .row{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}
  .role{
    width:280px;height:200px;border:1.5px solid var(--line);background:transparent;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    cursor:pointer;color:var(--text);transition:all .25s ease;position:relative;overflow:hidden;
  }
  .role::before{
    content:'';position:absolute;inset:0;background:var(--iris);background-size:300% 100%;
    opacity:0;transition:opacity .25s ease;animation:shimmer 4s linear infinite;
  }
  .role:hover{border-color:transparent;transform:translateY(-2px)}
  .role:hover::before{opacity:.18}
  .role .label{font-family:var(--display);font-size:64px;font-weight:900;letter-spacing:.02em;position:relative;z-index:1}
  .role .desc{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);position:relative;z-index:1}
  .role:hover .desc{color:var(--text)}
  .hint{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--muted);text-align:center;opacity:.6}

  /* Terminal */
  .terminal{width:min(680px,90vw)}
  .term-bar{background:#1F2937;border:1px solid #374151;border-bottom:none;padding:10px 14px;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:#9CA3AF}
  .term-dot{width:11px;height:11px;border-radius:50%}
  .td-r{background:#EF4444}.td-y{background:#F59E0B}.td-g{background:#10B981}
  .term-title{margin-left:10px;letter-spacing:.05em}
  .term-body{background:#0A0F1C;border:1px solid #374151;padding:22px 26px;font-family:var(--mono);font-size:14px;color:#E5E7EB;min-height:280px}
  .term-line{opacity:0;margin-bottom:10px;line-height:1.5}
  .term-line.on{opacity:1}
  .term-line .p{color:#10B981;margin-right:6px}
  .term-out{margin-top:18px;padding-top:14px;border-top:1px dashed #374151;font-family:var(--serif);font-size:15px;color:var(--text);opacity:0;transition:opacity .8s ease}
  .term-out.on{opacity:1}
  .term-whisper{font-family:'Inter',sans-serif;font-style:italic;color:var(--muted);margin-top:8px;font-size:13px}

  /* Final hero */
  .hero{flex-direction:column;gap:14px;text-align:center}
  .hero .label{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
  .hero h1{font-family:var(--display);font-weight:900;font-style:italic;font-size:clamp(56px,12vw,140px);line-height:1}
  .hero .tag{font-family:var(--serif);font-size:18px;color:var(--muted);margin-top:8px}
  .hero .cta{margin-top:28px;display:inline-block;padding:16px 38px;background:var(--iris);background-size:300% 100%;animation:shimmer 4s linear infinite;color:#fff;font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none}

  /* Top-right reset for the demo */
  .reset{position:fixed;top:14px;right:18px;z-index:99;font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;background:transparent;border:1px solid var(--line);padding:8px 14px;cursor:pointer;text-decoration:none}
  .reset:hover{color:var(--text);border-color:var(--text)}
  .badge{position:fixed;top:14px;left:18px;font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
</style>
</head>
<body>
<div class="badge">Mockup A · Side-by-Side Buttons</div>
<a class="reset" href="javascript:location.reload()">Replay</a>

<div class="stage">
  <div class="layer on" id="L1"><div class="confession"><div class="tline" id="t1"></div><div class="tline" id="t2"></div></div></div>

  <div class="layer fork" id="L2">
    <div class="prompt">pick one — it matters</div>
    <div class="row">
      <button class="role" data-role="sdr"><span class="label iris">SDR</span><span class="desc">I book the meetings</span></button>
      <button class="role" data-role="ae"><span class="label iris">AE</span><span class="desc">I close the deals</span></button>
    </div>
    <div class="hint">↑ this changes everything that comes next</div>
  </div>

  <div class="layer" id="L3"><div class="confession"><div class="tline" id="b3"></div><div class="tline" id="b4"></div><div class="tline" id="b5"></div></div></div>

  <div class="layer" id="L4">
    <div class="terminal">
      <div class="term-bar"><span class="term-dot td-r"></span><span class="term-dot td-y"></span><span class="term-dot td-g"></span><span class="term-title">you_already_knew.exe</span></div>
      <div class="term-body" id="termBody"></div>
    </div>
  </div>

  <div class="layer hero" id="L5">
    <div class="label">12 lessons · at your own pace · 1 you</div>
    <h1 class="iris">AESDR</h1>
    <div class="tag">AEs &amp; SDRs rule this world.</div>
    <a class="cta" href="javascript:location.reload()">Get Access ↗</a>
  </div>
</div>

<script>
const SDR = {
  scenes:[
    "You've been doing this for 9 months. They said “AE in 12.” Nobody's mentioned it since.",
    "You set your alarm for 6am on Sunday to “lock in” this week. By Tuesday you'd stopped pretending.",
    "You have a degree. From a university. With a campus. And your job is to get hung up on 97 times a day."
  ],
  term:[
    "> scanning your daily activity...",
    "> found: 47 dials. 3 connects. 1 “send me an email.” 0 meetings booked.",
    "> LinkedIn requests sent: 94. Accepted: 11. Replies: “thanks for reaching out!”",
    "> CRM notes: “VM” “VM” “VM” “gatekeeper” “VM” “wrong number” “VM”",
    "> diagnosis: I am a human spam filter with a quota and a dream."
  ]
};
const AE = {
  scenes:[
    "Your pipeline says $740K. You'd bet your rent on maybe $180K of it.",
    "Sunday night. You're doing “pipeline review.” That means staring at a spreadsheet and hoping something moves.",
    "Last quarter you missed by 31%. This quarter your number went up 30%. Nobody explained the math."
  ],
  term:[
    "> scanning your pipeline...",
    "> found: 22 open opportunities. 17 in “discovery” for 45+ days.",
    "> forecast accuracy last quarter: 34%. what you told your VP: 85%.",
    "> deals marked “closing this month”: 8. deals that will actually close: probably 2.",
    "> diagnosis: professional optimist with a commission plan."
  ]
};
const FINAL = "This course will change your life a few times throughout. Afterward, you’ll never make the same money again.";
const WHISPER = "Keep scrolling. It has to get worse before it gets better.";

function show(id){document.querySelectorAll('.layer').forEach(l=>l.classList.remove('on'));document.getElementById(id).classList.add('on')}
function type(el,txt,cb,d=32){let i=0;el.innerHTML='';(function step(){if(i>=txt.length){el.innerHTML=txt;setTimeout(cb,800);return}el.innerHTML=txt.slice(0,++i)+'<span class="cursor"></span>';setTimeout(step,d+Math.random()*16)})()}
function typeAll(els,lines,cb){let i=0;(function next(){if(i>=lines.length){cb();return}type(els[i],lines[i],()=>{i++;next()})})()}

function startConfession(){
  show('L1');
  type(document.getElementById('t1'),"So here's the scenario.",()=>{
    type(document.getElementById('t2'),"You're an AE. Or an SDR.",()=>{setTimeout(()=>show('L2'),700)});
  });
}
function pick(role){
  const data = role==='sdr'?SDR:AE;
  show('L3');
  setTimeout(()=>{
    typeAll([document.getElementById('b3'),document.getElementById('b4'),document.getElementById('b5')], data.scenes,()=>{
      setTimeout(()=>runTerminal(data.term),900);
    });
  },400);
}
function runTerminal(lines){
  show('L4');
  const body=document.getElementById('termBody');body.innerHTML='';
  const lineEls=lines.map(l=>{const d=document.createElement('div');d.className='term-line';d.dataset.text=l;d.innerHTML='<span></span>';body.appendChild(d);return d});
  const out=document.createElement('div');out.className='term-out';out.innerHTML=FINAL+'<div class="term-whisper">'+WHISPER+'</div>';body.appendChild(out);
  let i=0;
  function nextLine(){
    if(i>=lineEls.length){setTimeout(()=>{out.classList.add('on');setTimeout(()=>show('L5'),3500)},400);return}
    const el=lineEls[i],span=el.querySelector('span'),txt=el.dataset.text;el.classList.add('on');let ci=0;
    (function ch(){if(ci>=txt.length){span.textContent=txt;i++;setTimeout(nextLine,260);return}span.innerHTML=txt.slice(0,++ci)+'<span class="cursor"></span>';setTimeout(ch,18+Math.random()*10)})();
  }
  nextLine();
}

document.querySelectorAll('.role').forEach(b=>b.addEventListener('click',()=>pick(b.dataset.role)));
window.addEventListener('load',()=>setTimeout(startConfession,500));
</script>
</body>
</html>
