<!--
  AESDR — Classified Stamp
  Canon: §6.8.3 seed inventory — `.faq-stamp`
  Use: dossier panels, FAQ blocks, archival surfaces.
  Specs: Barlow Condensed 700 uppercase, .15em letter-spacing,
  --crimson at 25% body / 15% border, rotated -2°, 1px border.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 22" width="110" height="22" role="img" aria-label="Classified">
  <g transform="rotate(-2 55 11)">
    <rect x="0.5" y="0.5" width="109" height="21" fill="none" stroke="#8B1A1A" stroke-opacity="0.15" stroke-width="1"/>
    <text x="55" y="15" font-family="'Barlow Condensed', sans-serif" font-size="11" font-weight="700" letter-spacing="1.65" fill="#8B1A1A" fill-opacity="0.25" text-anchor="middle">CLASSIFIED</text>
  </g>
</svg>
