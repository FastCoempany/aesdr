<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AESDR Wordmark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1600px;height:900px;background:#FAF7F2;display:flex;align-items:center;justify-content:center;-webkit-print-color-adjust:exact}
.frame{display:flex;flex-direction:column;align-items:center;gap:20px}
.wordmark{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:900;font-size:340px;line-height:.9;color:#1A1A1A;letter-spacing:.01em}
.tag{font-family:'Space Mono',monospace;font-size:18px;letter-spacing:.3em;text-transform:uppercase;color:#6B6B6B}
.iris-bar{width:240px;height:2px;background:linear-gradient(90deg,#FF006E 0%,#FF6B00 17%,#F59E0B 34%,#10B981 51%,#38BDF8 68%,#8B5CF6 85%,#FF006E 100%);margin-top:6px}
</style>
</head>
<body>
<div class="frame">
  <div class="wordmark">AESDR.</div>
  <div class="iris-bar"></div>
  <div class="tag">THE OPERATING MANUAL</div>
</div>
</body>
</html>
