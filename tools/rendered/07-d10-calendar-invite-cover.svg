<?xml version="1.0" encoding="UTF-8"?>
<!--
  D10 Calendar Invite Cover (1280x720)
  Per canon sec 7.7 calendar invite cover spec:
    1280x720 cover image
    Cream background
    AESDR wordmark
    Partner lockup if co-branded (this version: AESDR-only; co-branded variant
       generated per pilot with the partner mark in the lockup slot)
    Mono workshop title
    Iris ambient line at bottom

  Use: cover image attached to D10 confirmation email's calendar invite.
  Render target: 1280x720 PNG when exported (use any browser/headless capture).

  Discipline checks (canon sec 6.9.1):
    1. Thumbnail: AESDR-fingerprint visible at 200x200 ok
    2. Token: only cream, ink, crimson, muted, light, iris ok
    3. Iris reservation: ambient line at bottom is canonical iris use (canon sec 6.4) ok
    4. Icon discipline: type-only ok
    5. Voice thumbnail: N/A (no body type beyond title)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1280 720"
     width="1280"
     height="720"
     role="img"
     aria-label="AESDR Workshop calendar invite cover">
  <title>AESDR Workshop — Calendar Invite Cover</title>
  <desc>1280×720 calendar invite cover. Cream background, AESDR wordmark, mono date band, iris ambient line.</desc>

  <defs>
    <!-- Iris gradient — canon §6.4 -->
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="17%" stop-color="#FF6B00"/>
      <stop offset="34%" stop-color="#F59E0B"/>
      <stop offset="51%" stop-color="#10B981"/>
      <stop offset="68%" stop-color="#38BDF8"/>
      <stop offset="85%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FAF7F2"/>

  <!-- Corner brackets — seed iconography (canon §6.8) -->
  <g stroke="#1A1A1A" stroke-width="1" opacity="0.06" fill="none">
    <path d="M 40 40 L 80 40 M 40 40 L 40 80"/>
    <path d="M 1240 40 L 1200 40 M 1240 40 L 1240 80"/>
    <path d="M 40 680 L 80 680 M 40 680 L 40 640"/>
    <path d="M 1240 680 L 1200 680 M 1240 680 L 1240 640"/>
  </g>

  <!-- Mono eyebrow -->
  <text x="640"
        y="200"
        font-family="'Space Mono', monospace"
        font-size="14"
        font-weight="700"
        letter-spacing="0.25em"
        text-anchor="middle"
        fill="#6B6B6B">AESDR · WORKSHOP</text>

  <!-- AESDR wordmark, centered, large -->
  <text x="640"
        y="380"
        font-family="'Playfair Display', Georgia, serif"
        font-size="180"
        font-weight="900"
        font-style="italic"
        letter-spacing="0.01em"
        text-anchor="middle"
        fill="#1A1A1A">AESDR</text>

  <!-- Workshop title placeholder, display italic 700 -->
  <text x="640"
        y="460"
        font-family="'Playfair Display', Georgia, serif"
        font-size="36"
        font-weight="700"
        font-style="italic"
        text-anchor="middle"
        fill="#1A1A1A">[WORKSHOP_TITLE]</text>

  <!-- Mono date band -->
  <text x="640"
        y="540"
        font-family="'Space Mono', monospace"
        font-size="20"
        font-weight="400"
        letter-spacing="0.2em"
        text-anchor="middle"
        fill="#1A1A1A">[YYYY-MM-DD] · [HH:MM] [TZ] · 60 MIN LIVE</text>

  <!-- Hosted-by line, cond -->
  <text x="640"
        y="590"
        font-family="'Barlow Condensed', sans-serif"
        font-size="16"
        font-weight="700"
        letter-spacing="0.15em"
        text-anchor="middle"
        fill="#6B6B6B">HOSTED BY [HOST_FIRST_NAME] [HOST_LAST_NAME]</text>

  <!-- Iris ambient line at bottom -->
  <rect x="0" y="715" width="1280" height="2" fill="url(#iris)" opacity="0.6"/>
</svg>
