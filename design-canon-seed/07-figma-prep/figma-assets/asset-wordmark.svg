<!--
  AESDR — Wordmark (text reference)
  Canon: §6.4 — wordmark is one of the 5 permitted iris uses.
  Type: Playfair Display, italic, 900wt.
  Default rendering: ink on cream. Iris-text rendering for hero / cover use.

  This SVG is a TYPE REFERENCE ONLY — Figma should re-author the wordmark
  as a live text node using --display token at 900 italic so the kerning,
  ligatures, and iris gradient fill resolve in Figma's text engine. Do not
  outline-to-shape unless exporting for production.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220" role="img" aria-label="AESDR wordmark">
  <rect width="600" height="220" fill="#FAF7F2"/>

  <defs>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF006E"/>
      <stop offset="17%"  stop-color="#FF6B00"/>
      <stop offset="34%"  stop-color="#F59E0B"/>
      <stop offset="51%"  stop-color="#10B981"/>
      <stop offset="68%"  stop-color="#38BDF8"/>
      <stop offset="85%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
  </defs>

  <!-- INK VARIANT (default) -->
  <text x="40" y="160" font-family="'Playfair Display', Georgia, serif" font-style="italic" font-weight="900" font-size="180" fill="#1A1A1A" letter-spacing="2">AESDR.</text>

  <!-- IRIS BAR (canon: 1px iris ambient line) -->
  <rect x="40" y="186" width="180" height="2" fill="url(#iris)"/>

  <!-- TAGLINE -->
  <text x="40" y="208" font-family="'Space Mono', monospace" font-size="11" letter-spacing="3.3" fill="#6B6B6B">THE OPERATING MANUAL</text>
</svg>
