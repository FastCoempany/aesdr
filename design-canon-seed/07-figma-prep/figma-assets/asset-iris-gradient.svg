<!--
  AESDR — Iris Gradient Reference Swatch
  Canon: §6.4 + §6.8 — the brand's reserved heartbeat gradient.
  Permitted uses ONLY: brand wordmark · single primary CTA · role tokens ·
  ambient lines (≤2px) · deck numerals · ≤1 accent word per headline.

  In Figma:
    1. Create a Color Style named "iris/gradient" with the same 7 stops.
    2. Apply that style to the wordmark, the iris CTA, role tokens, etc.
    3. Animate via background-position 0% → 200% over 4s for the
       canonical shimmer (Smart Animate two frames or use the Figma
       Motion plugin).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 140" width="1280" height="140" role="img" aria-label="Iris gradient swatch">
  <rect width="1280" height="140" fill="#FAF7F2"/>

  <defs>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF006E"/>
      <stop offset="17%"  stop-color="#FF6B00"/>
      <stop offset="34%"  stop-color="#F59E0B"/>
      <stop offset="51%"  stop-color="#10B981"/>
      <stop offset="68%"  stop-color="#38BDF8"/>
      <stop offset="85%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
  </defs>

  <!-- Mono header -->
  <text x="40" y="32" font-family="'Space Mono', monospace" font-size="11" letter-spacing="3.3" fill="#6B6B6B">AESDR · --IRIS · RESERVED ACCENT GRADIENT</text>

  <!-- The gradient bar -->
  <rect x="40" y="48" width="1200" height="48" fill="url(#iris)"/>

  <!-- Stop labels -->
  <g font-family="'Space Mono', monospace" font-size="9" fill="#1A1A1A">
    <text x="40"   y="116">0% · #FF006E</text>
    <text x="244"  y="116">17% · #FF6B00</text>
    <text x="448"  y="116">34% · #F59E0B</text>
    <text x="652"  y="116">51% · #10B981</text>
    <text x="856"  y="116">68% · #38BDF8</text>
    <text x="1060" y="116" text-anchor="end">85% · #8B5CF6   ·   100% · #FF006E</text>
  </g>
</svg>
