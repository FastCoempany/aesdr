<!--
  AESDR — Cursor / Term-Cursor
  Canon: §6.8.3 seed inventory — `.cursor`, `.term-cursor`
  Use: typing animations, terminal blocks, confession overlays.
  Specs: 7×14 (term variant) or 2×~17 (confession variant), --crimson, blink 0.8s.
  In Figma, animate via Smart Animate on a duplicated frame with opacity 0/1.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7 14" width="7" height="14" role="img" aria-label="Cursor">
  <rect x="0" y="0" width="7" height="14" fill="#8B1A1A"/>
</svg>
