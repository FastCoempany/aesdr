<!--
  AESDR — Corner Bracket (top-left variant)
  Canon: §6.8.3 seed inventory — `.corner.cTL`
  Use: cream-panel framing. Place 4× at panel corners (TL/TR/BL/BR).
  Specs: 20×20, 1px borders at rgba(0,0,0,0.06).
  This file = top-left orientation. Mirror in Figma for the other 3.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" role="img" aria-label="Corner bracket">
  <line x1="0" y1="0.5" x2="20" y2="0.5" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0.5" y1="0" x2="0.5" y2="20" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
</svg>
