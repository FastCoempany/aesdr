<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AESDR · Brand Visual System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #FAF7F2; }
  * { box-sizing: border-box; }
  .iris-shimmer-text {
    background: linear-gradient(90deg,#FF006E,#FF6B00,#F59E0B,#10B981,#38BDF8,#8B5CF6,#FF006E);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    animation: iris-flow 8s linear infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Document chrome — running header on every spread */
  .doc-shell { max-width: 1280px; margin: 0 auto; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="directions.jsx"></script>
<script type="text/babel" src="synthesis.jsx"></script>

<script type="text/babel" data-presets="react">
  const Cover = () => (
    <Section id="cover" kind="cream" style={{ padding: '120px 88px 88px' }}>
      <Eyebrow>AESDR · BRAND SYSTEMS · DOC v1.0 · CONFIDENTIAL</Eyebrow>
      <H1 size={132} style={{ marginTop: 32 }}>
        The Visual<br/>
        <em style={{ color: '#8B1A1A' }}>Operating Manual.</em>
      </H1>
      <IrisRule width={180} style={{ marginTop: 36 }} />
      <Lead style={{ marginTop: 28, maxWidth: 720 }}>
        A symbolic system for AESDR — designed so the brand stays recognizable
        when the wordmark is removed. Three directions, one synthesis,
        nine production-ready deliverables.
      </Lead>

      <div style={{ marginTop: 72, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18 }}>
        <Cell label="01 · DIAGNOSIS">
          What does AESDR own visually? What symbols could only belong to this brand?
        </Cell>
        <Cell label="02 · EXPLORATION">
          Three distinct directions — Marble, Neon, Tortoise-Hare — each pressure-tested.
        </Cell>
        <Cell label="03 · SYNTHESIS">
          One canonical system. Mascot, icons, badges, spots, UI marks, taxonomy, exports.
        </Cell>
      </div>

      <div style={{ marginTop: 96 }}>
        <Eyebrow>CONTENTS</Eyebrow>
        <ol style={{
          margin: '20px 0 0', padding: 0, listStyle: 'none',
          font: "16px/2 'Source Serif 4', Georgia, serif", color: '#1A1A1A',
          columnCount: 2, columnGap: 48,
        }}>
          <li>00 · Diagnosis &amp; ownable equity</li>
          <li>01 · Direction A — Marble Discipline</li>
          <li>02 · Direction B — Neon Operator</li>
          <li>03 · Direction C — Tortoise-Hare Doctrine</li>
          <li>04 · Synthesis decision</li>
          <li>05 · Mascot system</li>
          <li>06 · Expression sheet</li>
          <li>07 · Iconography system</li>
          <li>08 · Badge / achievement system</li>
          <li>09 · Spot illustration system</li>
          <li>10 · UI symbol system</li>
          <li>11 · Style guide</li>
          <li>12 · Naming taxonomy</li>
          <li>13 · Export recommendations</li>
        </ol>
      </div>
    </Section>
  );

  const SpreadHead = ({ n, name, sub }) => (
    <header style={{ display: 'flex', gap: 36, alignItems: 'flex-end', marginBottom: 36 }}>
      <Counter n={n} />
      <div>
        <Eyebrow>SPREAD · {n}</Eyebrow>
        <H2 size={56} style={{ marginTop: 6 }}>{name}</H2>
        {sub && <Lead style={{ marginTop: 10, maxWidth: 540 }}>{sub}</Lead>}
      </div>
    </header>
  );

  const DiagSpec = ({ label, rows }) => (
    <div style={{ background: '#FFFFFF', border: '1px solid #E8E4DF', padding: '20px 22px 22px' }}>
      <Eyebrow>{label}</Eyebrow>
      <div style={{ marginTop: 12 }}><Spec rows={rows} /></div>
    </div>
  );

  const Diagnosis = () => (
    <Section id="diagnosis" kind="paper">
      <SpreadHead n="00" name="Diagnosis" sub="What does AESDR already own?" />
      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 56, marginTop: 32 }}>
        <div>
          <Eyebrow>OWNABLE EQUITY · WHAT'S ALREADY THERE</Eyebrow>
          <H3 style={{ marginTop: 14 }}>The brand is already half-built. We catalogue, then sharpen.</H3>
          <Body style={{ marginTop: 18 }}>
            AESDR has a small but unusually defensible visual vocabulary: the cream-on-crimson
            editorial split, italic Playfair as verdict voice, a reserved iris gradient that only
            appears at brand seams, terminal/classified chrome, and Caveat as the single
            permitted handwriting. None of this resembles a SaaS sales-training competitor.
          </Body>
          <Body style={{ marginTop: 14 }}>
            What's missing is a <em>character</em>: a figure, a mark, a shape that someone could
            tattoo. The system below identifies that missing center, then designs three candidate
            answers before committing to one.
          </Body>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <DiagSpec label="OWNS" rows={[
            ['Crimson + cream split', 'Editorial, never SaaS-pastel'],
            ['Italic Playfair verdicts', 'High-status, courtroom register'],
            ['Iris gradient', 'Reserved — seams only, never a fill'],
            ['Terminal + classified chrome', 'Operator UI, not motivational'],
            ['Caveat margin voice', 'Single hand, single character'],
          ]} />
          <DiagSpec label="MISSING" rows={[
            ['A character',  'A figure that carries the lessons'],
            ['Achievement marks', 'Tangible "I finished L07" tokens'],
            ['Icon canon', 'Today: text-only. Tomorrow: a kit'],
            ['Spot illustration', 'Editorial moments that aren\'t photos'],
          ]} />
        </div>
      </div>
    </Section>
  );

  const App = () => (
    <div className="doc-shell">
      <Cover/>
      <Diagnosis/>
      <DirectionMarble/>
      <DirectionNeon/>
      <DirectionTH/>
      <SynthesisDecision/>
      <MascotSystem/>
      <ExpressionSheet/>
      <IconographySystem/>
      <BadgeSystem/>
      <SpotSystem/>
      <UISymbols/>
      <StyleGuide/>
      <NamingTaxonomy/>
      <ExportSpec/>
    </div>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
