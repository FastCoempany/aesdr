<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fork B — Inline Typewriter Choice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Barlow+Condensed:wght@400;500;600;700;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crimson:#8B1A1A;--cream:#FAF7F2;--ink:#1A1A1A;--muted:#6B6B6B;--light:#E8E4DF;
    --iris:linear-gradient(90deg,#FF006E 0%,#FF6B00 17%,#F59E0B 34%,#10B981 51%,#38BDF8 68%,#8B5CF6 85%,#FF006E 100%);
    --display:'Playfair Display',Georgia,serif;
    --serif:'Source Serif 4',Georgia,serif;
    --cond:'Barlow Condensed',sans-serif;
    --mono:'Space Mono',monospace;
    --hand:'Caveat',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--cream);color:var(--ink);font-family:var(--serif);line-height:1.6;min-height:100vh}
  @keyframes shimmer{to{background-position:300% 0}}
  @keyframes blink{50%{opacity:0}}
  @keyframes pulseLite{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}

  .iris-text{background:var(--iris);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}

  /* Production hairline + corner brackets */
  .ambient-line{position:fixed;bottom:0;left:0;width:100%;height:1px;background:var(--iris);background-size:300% 100%;animation:shimmer 4s linear infinite;opacity:.18;z-index:60;pointer-events:none}
  .corner{position:fixed;width:22px;height:22px;border-color:rgba(0,0,0,.10);border-style:solid;border-width:0;z-index:55;pointer-events:none}
  .c-tl{top:18px;left:18px;border-top-width:1px;border-left-width:1px}
  .c-tr{top:18px;right:18px;border-top-width:1px;border-right-width:1px}
  .c-bl{bottom:18px;left:18px;border-bottom-width:1px;border-left-width:1px}
  .c-br{bottom:18px;right:18px;border-bottom-width:1px;border-right-width:1px}

  .stage{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:18vh 24px 8vh}
  .reel{max-width:760px;width:100%}
  .tline{font-family:var(--display);font-size:clamp(22px,3.5vw,38px);font-style:italic;font-weight:400;line-height:1.5;color:var(--ink);min-height:1.6em;margin-bottom:18px;opacity:0;transition:opacity .5s ease}
  .tline.on{opacity:1}
  .cursor{display:inline-block;width:2px;height:1.05em;background:var(--crimson);vertical-align:text-bottom;margin-left:2px;animation:blink .8s step-end infinite}

  /* Inline pickable role tokens */
  .pick{cursor:pointer;position:relative;padding:0 2px;border-bottom:2px solid transparent;transition:all .2s ease}
  .pick.live{animation:pulseLite 2.2s ease-in-out infinite}
  .pick.live:hover{border-bottom-color:var(--crimson);transform:scale(1.05)}
  .pick.chosen{display:inline-block;animation:bigShift .5s forwards}
  @keyframes bigShift{0%{transform:scale(1)}100%{transform:scale(1.18)}}
  .pick.dim{color:var(--muted)!important;-webkit-text-fill-color:var(--muted);text-decoration:line-through;opacity:.45;filter:grayscale(1)}

  .picker-hint{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-top:8px;opacity:0;transition:opacity .4s}
  .picker-hint.on{opacity:.7}
  .picker-hint .arrow{display:inline-block;animation:bob 1.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* Terminal — production cream-frame box */
  .terminal-wrap{margin-top:36px;max-width:680px;width:100%;opacity:0;transition:opacity .5s ease}
  .terminal-wrap.on{opacity:1}
  .terminal{border:1px solid var(--light);background:rgba(0,0,0,0.02);font-family:var(--mono);box-shadow:0 2px 20px rgba(0,0,0,.04)}
  .term-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--light)}
  .term-dot{width:8px;height:8px;border-radius:50%}
  .td-r{background:rgba(239,68,68,.35)}.td-y{background:rgba(245,158,11,.35)}.td-g{background:rgba(16,185,129,.35)}
  .term-title{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;margin-left:auto}
  .term-body{padding:28px 24px;display:flex;flex-direction:column}
  .term-line{font-family:var(--mono);font-size:clamp(13px,1.8vw,17px);line-height:1.8;color:var(--ink);opacity:0;white-space:pre-wrap}
  .term-line.on{opacity:1}
  .prompt{color:var(--muted);margin-right:8px}
  .term-cursor{display:inline-block;width:7px;height:14px;background:var(--crimson);vertical-align:text-bottom;animation:blink .8s step-end infinite}
  .term-out{margin-top:24px;padding-top:20px;border-top:1px solid var(--light);font-family:var(--mono);font-size:clamp(14px,2vw,19px);font-weight:800;line-height:1.7;letter-spacing:.01em;opacity:0;transition:opacity .8s ease;background:var(--iris);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
  .term-out.on{opacity:1}
  .term-whisper{font-family:var(--serif);font-size:clamp(12px,1.4vw,15px);color:var(--muted);margin-top:16px;font-style:italic;font-weight:400;letter-spacing:0;background:none;-webkit-background-clip:unset;-webkit-text-fill-color:var(--muted);background-clip:unset;animation:none}

  .hero{margin-top:48px;text-align:center;opacity:0;transition:opacity .6s ease}
  .hero.on{opacity:1}
  .hero .label{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .hero h1{font-family:var(--display);font-size:clamp(80px,16vw,200px);font-weight:900;font-style:italic;line-height:.85;letter-spacing:.02em;margin:0}
  .hero .tag{font-family:var(--serif);font-size:clamp(16px,2vw,22px);font-style:italic;color:var(--muted);margin:14px 0 0}
  .hero .cta{display:inline-block;margin-top:22px;font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#fff;background:var(--iris);background-size:300% 100%;animation:shimmer 4s linear infinite;padding:16px 48px;text-decoration:none;transition:transform .15s,box-shadow .3s}
  .hero .cta:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(139,26,26,.25)}

  /* Demo chrome */
  .badge{position:fixed;top:14px;left:18px;font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;z-index:90}
  .reset{position:fixed;top:14px;right:18px;z-index:90;font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;background:transparent;border:1px solid var(--light);padding:8px 14px;cursor:pointer;text-decoration:none}
  .reset:hover{color:var(--ink);border-color:var(--ink)}

  html,body{scrollbar-width:none}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div class="badge">Mockup B · Inline Typewriter Choice</div>
<a class="reset" href="javascript:location.reload()">Replay</a>
<div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="ambient-line"></div>

<div class="stage">
  <div class="reel">
    <div class="tline" id="t1"></div>
    <div class="tline" id="t2"></div>
    <div class="picker-hint" id="hint"><span class="arrow">↑</span>&nbsp;&nbsp;click one — it changes everything that comes next</div>
    <div class="tline" id="b3" style="margin-top:24px"></div>
    <div class="tline" id="b4"></div>
    <div class="tline" id="b5"></div>
    <div class="terminal-wrap" id="termWrap">
      <div class="terminal">
        <div class="term-bar"><span class="term-dot td-r"></span><span class="term-dot td-y"></span><span class="term-dot td-g"></span><span class="term-title">you_already_knew.exe</span></div>
        <div class="term-body" id="termBody"></div>
      </div>
    </div>
    <div class="hero" id="hero">
      <div class="label">12 lessons · at your own pace · 1 you</div>
      <h1>AESDR</h1>
      <div class="tag">AEs &amp; SDRs rule this world.</div>
      <a class="cta" href="javascript:location.reload()">Get Access ↗</a>
    </div>
  </div>
</div>

<script>
const SDR = {
  scenes:[
    "You've been doing this for 9 months. They said “AE in 12.” Nobody's mentioned it since.",
    "You set your alarm for 6am on Sunday to “lock in” this week. By Tuesday you'd stopped pretending.",
    "You have a degree. From a university. With a campus. And your job is to get hung up on 97 times a day."
  ],
  term:[
    "> scanning your daily activity...",
    "> found: 47 dials. 3 connects. 1 “send me an email.” 0 meetings booked.",
    "> LinkedIn requests sent: 94. Accepted: 11. Replies: “thanks for reaching out!”",
    "> CRM notes: “VM” “VM” “VM” “gatekeeper” “VM” “wrong number” “VM”",
    "> diagnosis: I am a human spam filter with a quota and a dream."
  ]
};
const AE = {
  scenes:[
    "Your pipeline says $740K. You'd bet your rent on maybe $180K of it.",
    "Sunday night. You're doing “pipeline review.” That means staring at a spreadsheet and hoping something moves.",
    "Last quarter you missed by 31%. This quarter your number went up 30%. Nobody explained the math."
  ],
  term:[
    "> scanning your pipeline...",
    "> found: 22 open opportunities. 17 in “discovery” for 45+ days.",
    "> forecast accuracy last quarter: 34%. what you told your VP: 85%.",
    "> deals marked “closing this month”: 8. deals that will actually close: probably 2.",
    "> diagnosis: professional optimist with a commission plan."
  ]
};
const FINAL = "This course will change your life a few times throughout. Afterward, you'll never make the same money again.";
const WHISPER = "Keep scrolling. It has to get worse before it gets better.";

function typePlain(el,txt,cb,d=32){
  el.classList.add('on');let i=0;el.innerHTML='';
  (function step(){
    if(i>=txt.length){el.innerHTML=txt;setTimeout(cb,700);return}
    el.innerHTML=txt.slice(0,++i)+'<span class="cursor"></span>';
    setTimeout(step,d+Math.random()*16);
  })();
}

function typeWithFork(el,cb){
  el.classList.add('on');
  const segments = [
    {t:"You're an ",style:""},
    {t:"AE",style:"pick",role:"ae"},
    {t:". Or an ",style:""},
    {t:"SDR",style:"pick",role:"sdr"},
    {t:".",style:""}
  ];
  const flat=[];
  segments.forEach((seg,si)=>{for(const c of seg.t)flat.push({c,style:seg.style,role:seg.role,si})});
  let i=0;
  function render(idx){
    let html='',openSi=-1;
    for(let k=0;k<idx;k++){
      const f=flat[k];
      if(f.si!==openSi){
        if(openSi!==-1)html+='</span>';
        if(f.style==='pick')html+=`<span class="pick iris-text" data-role="${f.role}">`;
        else html+='<span>';
        openSi=f.si;
      }
      html+=f.c;
    }
    if(openSi!==-1)html+='</span>';
    el.innerHTML=html+'<span class="cursor"></span>';
  }
  (function step(){
    if(i>=flat.length){
      let html='',openSi=-1;
      for(let k=0;k<flat.length;k++){
        const f=flat[k];
        if(f.si!==openSi){
          if(openSi!==-1)html+='</span>';
          if(f.style==='pick')html+=`<span class="pick iris-text live" data-role="${f.role}">`;
          else html+='<span>';
          openSi=f.si;
        }
        html+=f.c;
      }
      if(openSi!==-1)html+='</span>';
      el.innerHTML=html;
      el.querySelectorAll('.pick').forEach(p=>p.addEventListener('click',()=>cb(p.dataset.role,p)));
      setTimeout(()=>document.getElementById('hint').classList.add('on'),300);
      return;
    }
    i++;render(i);
    setTimeout(step,38+Math.random()*16);
  })();
}

function pick(role){
  document.getElementById('hint').classList.remove('on');
  const all=document.querySelectorAll('.pick');
  all.forEach(p=>{
    p.classList.remove('live');
    if(p.dataset.role===role)p.classList.add('chosen');
    else p.classList.add('dim');
  });
  const data=role==='sdr'?SDR:AE;
  setTimeout(()=>{
    const els=[document.getElementById('b3'),document.getElementById('b4'),document.getElementById('b5')];
    let i=0;
    (function next(){
      if(i>=data.scenes.length){setTimeout(()=>runTerminal(data.term),700);return}
      typePlain(els[i],data.scenes[i],()=>{i++;next()});
    })();
  },800);
}

function runTerminal(lines){
  document.getElementById('termWrap').classList.add('on');
  document.getElementById('termWrap').scrollIntoView({behavior:'smooth',block:'center'});
  const body=document.getElementById('termBody');body.innerHTML='';
  const lineEls=lines.map(l=>{const d=document.createElement('div');d.className='term-line';d.dataset.text=l;d.innerHTML='<span class="prompt">&gt;</span><span></span>';body.appendChild(d);return d});
  const out=document.createElement('div');out.className='term-out';out.innerHTML=FINAL+'<div class="term-whisper">'+WHISPER+'</div>';body.appendChild(out);
  let i=0;
  function nextLine(){
    if(i>=lineEls.length){setTimeout(()=>{out.classList.add('on');setTimeout(()=>{document.getElementById('hero').classList.add('on');document.getElementById('hero').scrollIntoView({behavior:'smooth',block:'center'})},2400)},400);return}
    const el=lineEls[i],span=el.querySelectorAll('span')[1],txt=el.dataset.text.replace(/^> /,'');el.classList.add('on');let ci=0;
    (function ch(){if(ci>=txt.length){span.textContent=txt;i++;setTimeout(nextLine,260);return}span.innerHTML=txt.slice(0,++ci)+'<span class="term-cursor"></span>';setTimeout(ch,18+Math.random()*10)})();
  }
  nextLine();
}

window.addEventListener('load',()=>{
  setTimeout(()=>{
    typePlain(document.getElementById('t1'),"So here's the scenario.",()=>{
      typeWithFork(document.getElementById('t2'),pick);
    });
  },500);
});
</script>
</body>
</html>
