<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fork A — Side-by-Side Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Barlow+Condensed:wght@400;500;600;700;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crimson:#8B1A1A;--cream:#FAF7F2;--ink:#1A1A1A;--muted:#6B6B6B;--light:#E8E4DF;
    --iris:linear-gradient(90deg,#FF006E 0%,#FF6B00 17%,#F59E0B 34%,#10B981 51%,#38BDF8 68%,#8B5CF6 85%,#FF006E 100%);
    --display:'Playfair Display',Georgia,serif;
    --serif:'Source Serif 4',Georgia,serif;
    --cond:'Barlow Condensed',sans-serif;
    --mono:'Space Mono',monospace;
    --hand:'Caveat',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--cream);color:var(--ink);font-family:var(--serif);line-height:1.6;overflow:hidden}
  @keyframes shimmer{to{background-position:300% 0}}
  @keyframes blink{50%{opacity:0}}

  .iris-text{background:var(--iris);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}

  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px}
  .layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s ease;pointer-events:none}
  .layer.on{opacity:1;pointer-events:auto}

  /* Ambient iris hairline at bottom — production motif */
  .ambient-line{position:fixed;bottom:0;left:0;width:100%;height:1px;background:var(--iris);background-size:300% 100%;animation:shimmer 4s linear infinite;opacity:.18;z-index:60;pointer-events:none}
  /* Corner brackets — production motif */
  .corner{position:fixed;width:22px;height:22px;border-color:rgba(0,0,0,.10);border-style:solid;border-width:0;z-index:55;pointer-events:none}
  .c-tl{top:18px;left:18px;border-top-width:1px;border-left-width:1px}
  .c-tr{top:18px;right:18px;border-top-width:1px;border-right-width:1px}
  .c-bl{bottom:18px;left:18px;border-bottom-width:1px;border-left-width:1px}
  .c-br{bottom:18px;right:18px;border-bottom-width:1px;border-right-width:1px}

  /* Confession typed lines — italic Playfair, ink on cream */
  .confession{max-width:720px;width:90%;text-align:left}
  .tline{font-family:var(--display);font-size:clamp(22px,3.5vw,38px);font-style:italic;font-weight:400;line-height:1.5;color:var(--ink);min-height:1.6em;margin-bottom:18px}
  .cursor{display:inline-block;width:2px;height:1.05em;background:var(--crimson);vertical-align:text-bottom;margin-left:2px;animation:blink .8s step-end infinite}

  /* Fork */
  .fork{flex-direction:column;gap:36px}
  .fork .prompt{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);text-align:center}
  .fork .row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
  .role{
    width:300px;height:220px;border:1.5px solid var(--ink);background:var(--cream);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;color:var(--ink);transition:transform .2s ease, box-shadow .25s ease;
    position:relative;overflow:hidden;padding:24px;
  }
  .role::after{
    content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--iris);
    background-size:300% 100%;animation:shimmer 4s linear infinite;opacity:0;transition:opacity .25s ease;
  }
  .role:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(139,26,26,.12)}
  .role:hover::after{opacity:1}
  .role .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
  .role .label{font-family:var(--display);font-size:78px;font-weight:900;font-style:italic;line-height:1;letter-spacing:.02em}
  .role .desc{font-family:var(--serif);font-size:14px;color:var(--muted);font-style:italic;text-align:center;max-width:240px;line-height:1.5}
  .hint{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;text-align:center;opacity:.7}

  /* Terminal — production tone: cream-frame box, ink text, Space Mono */
  .terminal{max-width:680px;width:90%;border:1px solid var(--light);background:rgba(0,0,0,0.02);font-family:var(--mono);box-shadow:0 2px 20px rgba(0,0,0,.04)}
  .term-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--light)}
  .term-dot{width:8px;height:8px;border-radius:50%}
  .td-r{background:rgba(239,68,68,.35)}.td-y{background:rgba(245,158,11,.35)}.td-g{background:rgba(16,185,129,.35)}
  .term-title{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;margin-left:auto}
  .term-body{padding:clamp(20px,3vw,36px) clamp(16px,3vw,28px);display:flex;flex-direction:column}
  .term-line{font-size:clamp(13px,1.8vw,17px);line-height:1.8;color:var(--ink);opacity:0;white-space:pre-wrap;font-family:var(--mono)}
  .term-line.on{opacity:1}
  .prompt{color:var(--muted);margin-right:8px}
  .term-cursor{display:inline-block;width:7px;height:14px;background:var(--crimson);vertical-align:text-bottom;animation:blink .8s step-end infinite}
  .term-out{margin-top:24px;padding-top:20px;border-top:1px solid var(--light);font-family:var(--mono);font-size:clamp(14px,2vw,19px);font-weight:800;line-height:1.7;letter-spacing:.01em;opacity:0;transition:opacity .8s ease;background:var(--iris);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
  .term-out.on{opacity:1}
  .term-whisper{font-family:var(--serif);font-size:clamp(12px,1.4vw,15px);color:var(--muted);margin-top:16px;font-style:italic;font-weight:400;letter-spacing:0;background:none;-webkit-background-clip:unset;-webkit-text-fill-color:var(--muted);background-clip:unset;animation:none}

  /* Hero — production landing hero */
  .hero{flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;background:var(--cream)}
  .hero .label{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
  .hero h1{font-family:var(--display);font-size:clamp(80px,18vw,220px);font-weight:900;font-style:italic;line-height:.85;letter-spacing:.02em;margin:0}
  .hero .tag{font-family:var(--serif);font-size:clamp(16px,2vw,22px);font-style:italic;color:var(--muted);margin:0}
  .hero .cta{font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#fff;background:var(--iris);background-size:300% 100%;animation:shimmer 4s linear infinite;padding:16px 48px;text-decoration:none;margin-top:12px;transition:transform .15s,box-shadow .3s}
  .hero .cta:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(139,26,26,.25)}

  /* Demo chrome */
  .badge{position:fixed;top:14px;left:18px;font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;z-index:90}
  .reset{position:fixed;top:14px;right:18px;z-index:90;font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;background:transparent;border:1px solid var(--light);padding:8px 14px;cursor:pointer;text-decoration:none}
  .reset:hover{color:var(--ink);border-color:var(--ink)}
</style>
</head>
<body>
<div class="badge">Mockup A · Side-by-Side Buttons</div>
<a class="reset" href="javascript:location.reload()">Replay</a>
<div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="ambient-line"></div>

<div class="stage">
  <div class="layer on" id="L1"><div class="confession"><div class="tline" id="t1"></div><div class="tline" id="t2"></div></div></div>

  <div class="layer fork" id="L2">
    <div class="prompt">pick one — it changes everything that comes next</div>
    <div class="row">
      <button class="role" data-role="sdr">
        <span class="eyebrow">role · 01</span>
        <span class="label iris-text">SDR</span>
        <span class="desc">I book the meetings. I take the no's.</span>
      </button>
      <button class="role" data-role="ae">
        <span class="eyebrow">role · 02</span>
        <span class="label iris-text">AE</span>
        <span class="desc">I close the deals. I carry the number.</span>
      </button>
    </div>
    <div class="hint">↑ this is who you are</div>
  </div>

  <div class="layer" id="L3"><div class="confession"><div class="tline" id="b3"></div><div class="tline" id="b4"></div><div class="tline" id="b5"></div></div></div>

  <div class="layer" id="L4">
    <div class="terminal">
      <div class="term-bar"><span class="term-dot td-r"></span><span class="term-dot td-y"></span><span class="term-dot td-g"></span><span class="term-title">you_already_knew.exe</span></div>
      <div class="term-body" id="termBody"></div>
    </div>
  </div>

  <div class="layer hero" id="L5">
    <div class="label">12 lessons · at your own pace · 1 you</div>
    <h1>AESDR</h1>
    <div class="tag">AEs &amp; SDRs rule this world.</div>
    <a class="cta" href="javascript:location.reload()">Get Access ↗</a>
  </div>
</div>

<script>
const SDR = {
  scenes:[
    "You've been doing this for 9 months. They said “AE in 12.” Nobody's mentioned it since.",
    "You set your alarm for 6am on Sunday to “lock in” this week. By Tuesday you'd stopped pretending.",
    "You have a degree. From a university. With a campus. And your job is to get hung up on 97 times a day."
  ],
  term:[
    "> scanning your daily activity...",
    "> found: 47 dials. 3 connects. 1 “send me an email.” 0 meetings booked.",
    "> LinkedIn requests sent: 94. Accepted: 11. Replies: “thanks for reaching out!”",
    "> CRM notes: “VM” “VM” “VM” “gatekeeper” “VM” “wrong number” “VM”",
    "> diagnosis: I am a human spam filter with a quota and a dream."
  ]
};
const AE = {
  scenes:[
    "Your pipeline says $740K. You'd bet your rent on maybe $180K of it.",
    "Sunday night. You're doing “pipeline review.” That means staring at a spreadsheet and hoping something moves.",
    "Last quarter you missed by 31%. This quarter your number went up 30%. Nobody explained the math."
  ],
  term:[
    "> scanning your pipeline...",
    "> found: 22 open opportunities. 17 in “discovery” for 45+ days.",
    "> forecast accuracy last quarter: 34%. what you told your VP: 85%.",
    "> deals marked “closing this month”: 8. deals that will actually close: probably 2.",
    "> diagnosis: professional optimist with a commission plan."
  ]
};
const FINAL = "This course will change your life a few times throughout. Afterward, you'll never make the same money again.";
const WHISPER = "Keep scrolling. It has to get worse before it gets better.";

function show(id){document.querySelectorAll('.layer').forEach(l=>l.classList.remove('on'));document.getElementById(id).classList.add('on')}
function type(el,txt,cb,d=32){let i=0;el.innerHTML='';(function step(){if(i>=txt.length){el.innerHTML=txt;setTimeout(cb,800);return}el.innerHTML=txt.slice(0,++i)+'<span class="cursor"></span>';setTimeout(step,d+Math.random()*16)})()}
function typeAll(els,lines,cb){let i=0;(function next(){if(i>=lines.length){cb();return}type(els[i],lines[i],()=>{i++;next()})})()}

function startConfession(){
  show('L1');
  type(document.getElementById('t1'),"So here's the scenario.",()=>{
    type(document.getElementById('t2'),"You're an AE. Or an SDR.",()=>{setTimeout(()=>show('L2'),700)});
  });
}
function pick(role){
  const data=role==='sdr'?SDR:AE;
  show('L3');
  setTimeout(()=>{
    typeAll([document.getElementById('b3'),document.getElementById('b4'),document.getElementById('b5')], data.scenes,()=>{
      setTimeout(()=>runTerminal(data.term),900);
    });
  },400);
}
function runTerminal(lines){
  show('L4');
  const body=document.getElementById('termBody');body.innerHTML='';
  const lineEls=lines.map(l=>{const d=document.createElement('div');d.className='term-line';d.dataset.text=l;d.innerHTML='<span class="prompt">&gt;</span><span></span>';return body.appendChild(d),d});
  const out=document.createElement('div');out.className='term-out';out.innerHTML=FINAL+'<div class="term-whisper">'+WHISPER+'</div>';body.appendChild(out);
  let i=0;
  function nextLine(){
    if(i>=lineEls.length){setTimeout(()=>{out.classList.add('on');setTimeout(()=>show('L5'),3500)},400);return}
    const el=lineEls[i],span=el.querySelectorAll('span')[1],txt=el.dataset.text.replace(/^> /,'');el.classList.add('on');let ci=0;
    (function ch(){if(ci>=txt.length){span.textContent=txt;i++;setTimeout(nextLine,260);return}span.innerHTML=txt.slice(0,++ci)+'<span class="term-cursor"></span>';setTimeout(ch,18+Math.random()*10)})();
  }
  nextLine();
}

document.querySelectorAll('.role').forEach(b=>b.addEventListener('click',()=>pick(b.dataset.role)));
window.addEventListener('load',()=>setTimeout(startConfession,500));
</script>
</body>
</html>
