<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero — The Confession</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap');

  :root {
    --bg: #020617;
    --text: #F8FAFC;
    --muted: #94A3B8;
    --theme: #10B981;
    --amber: rgba(245,158,11,0.7);
    --iris: linear-gradient(90deg, #FF006E, #FF6B00, #F59E0B, #10B981, #38BDF8, #8B5CF6, #FF006E);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .hero {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Typing area */
  .typing-area {
    max-width: 680px;
    width: 90%;
    text-align: left;
    position: relative;
    z-index: 2;
  }

  /* The typed line — Rowan Pope voice */
  .typed-line {
    font-family: 'Inter', sans-serif;
    font-size: clamp(22px, 3.5vw, 38px);
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    min-height: 3em;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--theme);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* The "You lied" slam */
  .slam {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(56px, 12vw, 140px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .02em;
    line-height: 0.9;
    margin-top: 40px;
    opacity: 0;
    color: var(--text);
  }

  .slam.visible {
    opacity: 1;
    animation: slamIn 0.3s cubic-bezier(.23,1,.32,1);
  }

  @keyframes slamIn {
    0% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Michael's response */
  .confession {
    font-family: 'Caveat', cursive;
    font-size: clamp(20px, 3vw, 30px);
    color: var(--amber);
    margin-top: 36px;
    line-height: 1.4;
    opacity: 0;
    transform: rotate(-0.5deg);
    max-width: 500px;
  }

  .confession.visible {
    opacity: 1;
    animation: fadeUp 0.6s ease;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(12px) rotate(-0.5deg); }
    100% { opacity: 1; transform: translateY(0) rotate(-0.5deg); }
  }

  /* Scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 2;
    opacity: 0;
  }

  .scroll-hint.visible {
    animation: fadeIn 0.5s ease forwards;
  }

  .scroll-hint .text {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: rgba(245,158,11,0.35);
  }

  .scroll-hint .bar {
    width: 1px;
    height: 28px;
    position: relative;
    overflow: hidden;
  }

  .scroll-hint .bar::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 1px;
    height: 100%;
    background: var(--iris);
    background-size: 100% 300%;
    animation: shimmer 4s linear infinite, drop 1.5s ease-in-out infinite;
  }

  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes drop {
    0% { top: -100%; }
    50% { top: 0; }
    100% { top: 100%; }
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  /* Faint ambient line */
  .ambient-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--iris);
    background-size: 300% 100%;
    animation: shimmer 4s linear infinite;
    opacity: 0.1;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="ambient-line"></div>

  <div class="typing-area">
    <div class="typed-line" id="typed"></div>
    <div class="slam" id="slam">You lied.</div>
    <div class="confession" id="confession">...it's fine. We all lied. That's why we're here.<br>Scroll down. It doesn't get more comfortable, but it gets more honest.</div>
  </div>

  <div class="scroll-hint" id="scroll-hint">
    <span class="text">↓ the truth is below</span>
    <div class="bar"></div>
  </div>
</div>

<script>
const typedEl = document.getElementById('typed');
const slamEl = document.getElementById('slam');
const confessionEl = document.getElementById('confession');
const scrollHint = document.getElementById('scroll-hint');

const lines = [
  { text: "The last time someone asked how sales was going,", delay: 35 },
  { text: "\nyou said ", delay: 45 },
  { text: "\"good.\"", delay: 70 },
];

// Flatten into character sequence with per-char delays
let chars = [];
lines.forEach(line => {
  for (let i = 0; i < line.text.length; i++) {
    chars.push({ ch: line.text[i], delay: line.delay });
  }
  // Pause between lines
  chars.push({ ch: '', delay: 300 });
});

let i = 0;
let html = '';

function typeNext() {
  if (i >= chars.length) {
    // Done typing — pause then slam
    setTimeout(() => {
      // Remove cursor effect
      typedEl.innerHTML = html;
      slamEl.classList.add('visible');

      setTimeout(() => {
        confessionEl.classList.add('visible');
      }, 800);

      setTimeout(() => {
        scrollHint.classList.add('visible');
      }, 1600);
    }, 600);
    return;
  }

  const { ch, delay } = chars[i];
  if (ch === '\n') {
    html += '<br>';
  } else if (ch !== '') {
    html += ch;
  }
  typedEl.innerHTML = html + '<span class="cursor"></span>';
  i++;

  setTimeout(typeNext, ch === '' ? delay : delay + Math.random() * 20);
}

// Start after brief pause
setTimeout(typeNext, 800);
</script>

</body>
</html>
