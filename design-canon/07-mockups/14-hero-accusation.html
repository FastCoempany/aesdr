<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero — The Accusation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&family=Caveat:wght@400;600&display=swap');

  :root {
    --bg: #020617;
    --text: #F8FAFC;
    --muted: #94A3B8;
    --theme: #10B981;
    --amber: rgba(245,158,11,0.7);
    --iris: linear-gradient(90deg, #FF006E, #FF6B00, #F59E0B, #10B981, #38BDF8, #8B5CF6, #FF006E);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .hero {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Background ghost text */
  .ghost {
    position: absolute;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(200px, 35vw, 450px);
    text-transform: uppercase;
    color: rgba(248,250,252,0.012);
    white-space: nowrap;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    letter-spacing: .04em;
    line-height: 0.8;
    pointer-events: none;
    animation: ghostDrift 8s ease-in-out infinite alternate;
  }

  @keyframes ghostDrift {
    0% { transform: translate(-50%, -55%) scale(1); }
    100% { transform: translate(-50%, -55%) scale(1.03); }
  }

  /* Main accusation */
  .accusation {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(52px, 12vw, 140px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .02em;
    line-height: 0.95;
    text-align: center;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeSlam 0.8s cubic-bezier(.23,1,.32,1) 0.3s forwards;
  }

  @keyframes fadeSlam {
    0% { opacity: 0; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Handwritten response */
  .response {
    font-family: 'Caveat', cursive;
    font-size: clamp(18px, 2.8vw, 30px);
    color: var(--amber);
    text-align: center;
    max-width: 520px;
    line-height: 1.5;
    margin-top: 32px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.2s forwards;
    transform: rotate(-0.5deg);
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(12px) rotate(-0.5deg); }
    100% { opacity: 1; transform: translateY(0) rotate(-0.5deg); }
  }

  /* Scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.5s ease 2s forwards;
    z-index: 2;
  }

  .scroll-hint .text {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: rgba(245,158,11,0.4);
  }

  .scroll-hint .arrow {
    width: 1px;
    height: 32px;
    position: relative;
    overflow: hidden;
  }

  .scroll-hint .arrow::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 1px;
    height: 100%;
    background: var(--iris);
    background-size: 100% 300%;
    animation: shimmer 4s linear infinite, arrowDrop 1.5s ease-in-out infinite;
  }

  @keyframes arrowDrop {
    0% { top: -100%; }
    50% { top: 0%; }
    100% { top: 100%; }
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  /* Iris line across top */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--iris);
    background-size: 300% 100%;
    animation: shimmer 4s linear infinite;
    opacity: 0.3;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="top-line"></div>
  <div class="ghost">STILL HERE</div>

  <div class="accusation">You're still here.</div>

  <div class="response">
    Most people would have closed this tab by now.<br>
    Or gone back to reorganizing their CRM by color. Again.<br>
    The second time was by font. Don't ask.
  </div>

  <div class="scroll-hint">
    <span class="text">↓ keep going. it gets worse.</span>
    <div class="arrow"></div>
  </div>
</div>

</body>
</html>
